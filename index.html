<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator</title>

    <!----Link Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!----Link Styles-->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <div class="card-container">
            <!-- Card Header -->
                <div class="header">
                    <h1>Calorie Calculator</h1>
                    <p class="type" id="current-system">Imperial</p>
                </div>
            <div>
                <form class="form-container">
                    <!-- Toggle -->
                     <div class="form-input">                
                        <label for="gender">System</label>
                        <div class="radio-button">
                            <input type="radio" name="system" id="imperial" checked required>
                            <label for="imperial">Imperial</label>
                        </div>
                        <div class="radio-button">
                            <input type="radio" name="system" id="metric" required>
                            <label for="metric">Metric</label>
                        </div>
                    </div>

                    <!----Age-->
                    <div class="form-input">
                        <label for="age">Age</label>
                        <input type="number" name="age" id="age" placeholder="ages 15 - 80" min="15" max="80" required>
                    </div>
                    
                    <!----Gender-->
                    <div class="form-input">                
                        <label for="gender">Gender</label>
                        <div class="radio-button">
                            <input type="radio" name="gender" id="male" checked required>
                            <label for="male">Male</label>
                        </div>
                        <div class="radio-button">
                            <input type="radio" name="gender" id="female" required>
                            <label for="female">Female</label>
                        </div>
                    </div>

                    <!----Height-->
                    <div class="form-input">
                        <label for="height">Height</label>
                        <input type="number" name="height" id="height" placeholder="feet" required>
                        <input type="number" name="inches" id="inches" placeholder="inches" required>
                    </div>
                    

                    <!----Weight-->
                    <div class="form-input">
                        <label for="weight">Weight</label>
                        <input type="number" name="weight" id="weight" placeholder="pounds" required>
                    </div>
                    
                    <!----Activity-->
                    <div class="form-input">
                        <label for="activity">Activity</label>
                        <select name="activity" id="activity">
                            <option value="bmr">Basal Metabolic Rate (BMR)</option>
                            <option value="sedentary">Sedentary: little or no exercise</option>
                            <option value="light">Lightly active: light exercise/sports 1–3 days per week</option>
                            <option value="moderate">Moderately active: moderate exercise/sports 3–5 days per week</option>
                            <option value="very">Very active: hard exercise/sports 6–7 days per week</option>
                            <option value="extra">Extra active: very hard exercise/physical job</option>
                        </select>
                    </div>

                    <!----Submit-->
                    <div class="button-container">
                        <button class="calc" id="calc" type="submit">Calculate</button>
                        <button class="clear" id="clear" onclick=clearAll()>Clear</button>
                    </div>
                </form>

            </div>
            <div>
                <!-- Result Side -->
                 <div class="results-side">
                    
                    <h3>Results (Calories/day)</h3>
                    
                    <div class="results-container">
                        <div  class="result-card maintain">
                            <h3 id="bmr-title">Maintain Weight</h3>
                            <p id="result-maintain">0</p>
                        </div>
                        <div class="result-card hide">
                            <h3>Mild Weight Loss</h3>
                            <p id="result-mild-loss">0</p>
                        </div>
                        <div class="result-card hide">
                            <h3>Weight Loss</h3>
                            <p id="result-loss">0</p>
                        </div>
                        <div class="result-card hide">
                            <h3>Extreme Weight Loss</h3>
                            <p id="result-extreme-loss">0</p>
                        </div>
                        
                        <div class="result-card hide">
                            <h3>Mild Weight Gain</h3>
                            <p id="result-mild-gain">0</p>
                        </div>
                        <div class="result-card hide">
                            <h3>Weight Gain</h3>
                            <p id="result-gain">0</p>
                        </div>
                        <div class="result-card hide">
                            <h3>Extreme Weight Gain</h3>
                            <p id="result-extreme-gain">0</p>
                        </div>
                    </div>
                    <button class="reset" id="reset" onclick=resetAll()>Start Over</button>
                </div>
            </div>
        </div>  
    </div>

    <p id="copyright"></p>

    <script src="index.js"></script>
</body>
</html>
